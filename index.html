<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Personal Camera • Telegram Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #1e1e1e;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #fff;
            text-align: center;
            margin-bottom: 8px;
        }
        .badge {
            text-align: center;
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 20px;
            background: #2a2a2a;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding: 6px 12px;
            border-radius: 40px;
        }
        .camera-wrapper {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
            aspect-ratio: 4 / 3;
        }
        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        canvas {
            display: none;
        }
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            background: #2c2c2c;
            color: white;
        }
        button.primary {
            background: #0088cc;
            color: white;
        }
        button.danger {
            background: #e53935;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .preview-area {
            background: #121212;
            border-radius: 20px;
            padding: 12px;
            margin-top: 10px;
        }
        .preview-title {
            color: #aaa;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }
        #previewImg {
            width: 100%;
            border-radius: 16px;
            display: none;
            background: #000;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 40px;
            background: #2a2a2a;
            color: #ccc;
            font-size: 0.85rem;
            text-align: center;
        }
        .config {
            background: #121212;
            border-radius: 20px;
            padding: 12px;
            margin-top: 15px;
        }
        input {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 40px;
            color: white;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }
        label {
            font-size: 0.7rem;
            color: #aaa;
            display: block;
            margin-bottom: 4px;
        }
        hr {
            border-color: #333;
            margin: 15px 0;
        }
        .footnote {
            font-size: 0.7rem;
            text-align: center;
            color: #555;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📸 Camera → Telegram</h1>
    <div style="text-align: center;"><span class="badge">🔒 Personal tool – only you see the data</span></div>

    <div class="camera-wrapper">
        <video id="cameraFeed" autoplay playsinline></video>
        <canvas id="photoCanvas"></canvas>
    </div>

    <div class="controls">
        <button id="requestCamBtn" class="primary">📷 Enable Camera</button>
        <button id="captureBtn" disabled>⚡ Take Photo</button>
        <button id="sendBtn" disabled>📤 Send to Telegram</button>
    </div>

    <div class="preview-area">
        <div class="preview-title">📸 Last captured</div>
        <img id="previewImg" alt="Preview">
    </div>

    <div class="config">
        <label>🤖 Telegram Bot Token</label>
        <input type="text" id="botToken" placeholder="1234567890:ABCdefGHIJKLMNopqrsTUVwxyz" value="">
        <label>💬 Telegram Chat ID</label>
        <input type="text" id="chatId" placeholder="123456789" value="">
        <label style="font-size:0.7rem; margin-top:5px;">(Your backend endpoint URL – leave as default if using provided API)</label>
        <input type="text" id="apiEndpoint" placeholder="/api/send_photo" value="/api/send_photo">
    </div>

    <div class="status" id="statusMsg">
        🟢 Ready – request camera first
    </div>
    <div class="footnote">
        ⚡ Your photo is sent to YOUR Telegram bot via a secure proxy.<br>
        No third parties, no Instagram, no storage.
    </div>
</div>

<script>
    // DOM elements
    const video = document.getElementById('cameraFeed');
    const canvas = document.getElementById('photoCanvas');
    const previewImg = document.getElementById('previewImg');
    const requestBtn = document.getElementById('requestCamBtn');
    const captureBtn = document.getElementById('captureBtn');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('statusMsg');

    let mediaStream = null;
    let currentPhotoBase64 = null;  // stores base64 dataURL without prefix

    // Update status helper
    function setStatus(text, isError = false) {
        statusDiv.innerHTML = `${isError ? '❌' : '🔵'} ${text}`;
        statusDiv.style.background = isError ? '#3a1a1a' : '#2a2a2a';
    }

    // Request camera
    async function requestCamera() {
        try {
            if (mediaStream) {
                // stop any existing tracks
                mediaStream.getTracks().forEach(track => track.stop());
            }
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            mediaStream = stream;
            video.srcObject = stream;
            setStatus('Camera active – ready to take photo');
            requestBtn.disabled = true;
            captureBtn.disabled = false;
            sendBtn.disabled = true;  // no photo yet
            currentPhotoBase64 = null;
            previewImg.style.display = 'none';
        } catch (err) {
            console.error(err);
            setStatus('Camera access denied or error: ' + err.message, true);
        }
    }

    // Capture photo from video stream
    function capturePhoto() {
        if (!video.videoWidth || !video.videoHeight) {
            setStatus('Camera not ready, please wait', true);
            return;
        }

        // set canvas dimensions to match video
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        // if you want mirror effect (like selfie), uncomment next line:
        // ctx.translate(canvas.width, 0);
        // ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // convert to JPEG base64 (smaller size)
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        currentPhotoBase64 = dataUrl.split(',')[1]; // remove "data:image/jpeg;base64,"
        
        // show preview
        previewImg.src = dataUrl;
        previewImg.style.display = 'block';
        
        setStatus('Photo captured! Click "Send to Telegram"');
        sendBtn.disabled = false;
    }

    // Send photo + optional metadata to backend proxy, which forwards to Telegram
    async function sendToTelegram() {
        if (!currentPhotoBase64) {
            setStatus('No photo captured yet', true);
            return;
        }

        const botToken = document.getElementById('botToken').value.trim();
        const chatId = document.getElementById('chatId').value.trim();
        let apiEndpoint = document.getElementById('apiEndpoint').value.trim();

        if (!botToken || !chatId) {
            setStatus('Please fill Bot Token and Chat ID in the config section', true);
            return;
        }

        if (!apiEndpoint) apiEndpoint = '/api/send_photo';
        
        setStatus('📤 Sending photo to Telegram via proxy...');
        sendBtn.disabled = true;
        
        try {
            const response = await fetch(apiEndpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    botToken: botToken,
                    chatId: chatId,
                    photoBase64: currentPhotoBase64,
                    timestamp: new Date().toISOString()
                })
            });
            
            const data = await response.json();
            if (response.ok && data.success) {
                setStatus('✅ Photo sent successfully to Telegram!');
                // optional: keep photo, but allow new capture
                sendBtn.disabled = false; // can resend same photo
            } else {
                setStatus('❌ Telegram error: ' + (data.error || 'unknown'), true);
                sendBtn.disabled = false;
            }
        } catch (err) {
            console.error(err);
            setStatus('Network error: ' + err.message, true);
            sendBtn.disabled = false;
        }
    }

    // Event listeners
    requestBtn.addEventListener('click', requestCamera);
    captureBtn.addEventListener('click', capturePhoto);
    sendBtn.addEventListener('click', sendToTelegram);
    
    // Cleanup when page closes
    window.addEventListener('beforeunload', () => {
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
        }
    });
</script>
</body>
</html>
